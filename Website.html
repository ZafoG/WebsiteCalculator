<!DOCTYPE html>
<html>
    <head>
        <title>
            Online Calculator
        </title>
        <link rel="stylesheet" href="Ordnung.css">
    </head>
    <body>
        <h1>Taschenrechner</h1>
        <p>Drücken Sie auf die jeweiligen Buttons für eine Zahl</p>
        <hr>
        <div>
            <button>1</button>
            <button>2</button>
            <button>3</button>
        </div>
        <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
        </div>
        <div>
            <button>7</button>
            <button>8</button>
            <button>9</button>
        </div>
        <div>
            <button>+</button>
            <button>-</button>
            <button>=</button>
        </div>
    </body>
</html>
