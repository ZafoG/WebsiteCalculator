<!DOCTYPE html>
<html>
    <head>
        <title>
            Online Calculator
        </title>
        <link rel="stylesheet" href="Ordnung.css">
    </head>
    <body>
        <h1>Taschenrechner</h1>
        <p>Drücken Sie auf die jeweiligen Buttons für eine Zahl</p>
        <hr>
        <div>
            <button id="*">*</button>
            <button id="/">/</button>
            <button id="CE">CE</button>
        </div>
        <div>
            <button id="7">7</button>
            <button id="8">8</button>
            <button id="9">9</button>
        </div>
        <div>
            <button id="4">4</button>
            <button id="5">5</button>
            <button id="6">6</button>
        </div>
        <div>
            <button id="1">1</button>
            <button id="2">2</button>
            <button id="3">3</button>
        </div>
        <div>
            <button id="0">0</button>
            <button id=",">,</button>
            <button id="=">=</button>
        </div>
        <script funktionen.js></script>
    </body>
</html>
